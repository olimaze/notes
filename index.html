<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clinical Note Generator</title>
<style>
body { font-family: Arial; max-width: 800px; margin: 40px auto; }
h2 { margin-top: 30px; }
label { display:block; margin-top:10px; }
button { margin-top:20px; padding:10px; font-size:16px; }
textarea { width:100%; height:200px; margin-top:20px; }
</style>
</head>

<body>

<h1>Clinical Note Generator</h1>

<h2>Restoration</h2>

<label>Tooth:
<input type="text" id="tooth">
</label>

<label>Diagnosis:
<select id="diagnosis">
<option>Primary caries</option>
<option>Secondary caries</option>
<option>Fracture</option>
<option>Lost restoration</option>
</select>
</label>

<label>Anesthesia:
<select id="anesthesia">
<option>None</option>
<option>1 carpule 2% lidocaine with epinephrine</option>
<option>2 carpules 2% lidocaine with epinephrine</option>
<option>1 carpule Septocaine</option>
<option>2 carpules Septocaine</option>
</select>
</label>

<label>Isolation:
<select id="isolation">
<option>Rubber dam</option>
<option>Cotton rolls</option>
</select>
</label>

<label>Matrix:
<select id="matrix">
<option>Sectional matrix</option>
<option>Tofflemire</option>
<option>None</option>
</select>
</label>

<label>Material:
<select id="material">
<option>Composite</option>
<option>Flowable liner + Composite</option>
<option>Fuji II</option>
</select>
</label>

<button onclick="generateNote()">Generate Note</button>

<textarea id="output"></textarea>

<button onclick="copyText()">Copy to Clipboard</button>

<script>
function generateNote() {
let tooth = document.getElementById("tooth").value;
let diagnosis = document.getElementById("diagnosis").value;
let anesthesia = document.getElementById("anesthesia").value;
let isolation = document.getElementById("isolation").value;
let matrix = document.getElementById("matrix").value;
let material = document.getElementById("material").value;

let anesthesiaText = anesthesia === "None" ? "" : anesthesia + " administered. ";

let note = "Patient presented with " + diagnosis + " on tooth " + tooth + ". "
+ anesthesiaText
+ "Isolation achieved with " + isolation + ". "
+ (matrix !== "None" ? matrix + " placed. " : "")
+ "Caries removed and restored using " + material + ". "
+ "Occlusion verified and polished. Patient tolerated procedure well.";

document.getElementById("output").value = note;
}

function copyText() {
let copyText = document.getElementById("output");
copyText.select();
document.execCommand("copy");
alert("Copied!");
}
</script>

</body>
</html>
